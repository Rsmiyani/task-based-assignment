<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Online Quiz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="quiz-page">
    <section class="quiz-card" aria-labelledby="quizTitle">
      <h1 id="quizTitle">Online Quiz</h1>

      <form class="quiz-form">
        <fieldset class="question-block">
          <legend>1. Which tag is used to create a hyperlink in HTML?</legend>
          <label><input type="radio" name="q1" /> &lt;a&gt;</label>
          <label><input type="radio" name="q1" /> &lt;p&gt;</label>
          <label><input type="radio" name="q1" /> &lt;div&gt;</label>
        </fieldset>

        <fieldset class="question-block">
          <legend>2. Which tag is used for the largest heading?</legend>
          <label><input type="radio" name="q2" /> &lt;h6&gt;</label>
          <label><input type="radio" name="q2" /> &lt;h1&gt;</label>
          <label><input type="radio" name="q2" /> &lt;span&gt;</label>
        </fieldset>

        <fieldset class="question-block">
          <legend>3. Which element is used to add a line break?</legend>
          <label><input type="radio" name="q3" /> &lt;hr&gt;</label>
          <label><input type="radio" name="q3" /> &lt;br&gt;</label>
          <label><input type="radio" name="q3" /> &lt;section&gt;</label>
        </fieldset>

        <button type="submit" class="submit-btn">Submit Quiz</button>
      </form>
    </section>
  </main>
</body>
</html>
