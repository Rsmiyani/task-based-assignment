<!--
  Dynamic Table Creator
  - Enter rows and columns, click "Create Table".
  - Each cell contains a text input.
  - On submit, no text field may be empty (validated).
  - Minimalistic design, Comic Sans typography, inline styles only.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dynamic Table Creator</title>
  </head>
  <body style="font-family: 'Comic Sans MS', 'Comic Sans', cursive; background:#f7f8fb; margin:32px; color:#111; ">

    <div style="max-width:820px; margin:0 auto; border: solid black; border-radius: 10px; padding: 20px ;">

      <!-- Header -->
      <div style="margin-bottom:18px;">
        <h1 style="margin:0 0 6px 0; font-size:24px;">Create a Table (rows × columns)</h1>
      </div>

      <!-- Controls -->
      <div style="display:flex; gap:10px; align-items:center; margin-bottom:12px;">
        <label style="display:flex; gap:6px; align-items:center; color:#333;">
          Rows
          <input id="rows" type="number" min="1" max="50" value="3" style="width:72px; padding:6px; border-radius:6px; border:1px solid #ccc;" />
        </label>

        <label style="display:flex; gap:6px; align-items:center; color:#333;">
          Columns
          <input id="cols" type="number" min="1" max="50" value="4" style="width:72px; padding:6px; border-radius:6px; border:1px solid #ccc;" />
        </label>

        <button id="createBtn" style="padding:8px 12px; border-radius:8px; border:1px solid #333; background:#fff; cursor:pointer;">Create Table</button>
        <button id="resetBtn" style="padding:8px 12px; border-radius:8px; border:1px solid #ccc; background:#fff; cursor:pointer;">Reset</button>
      </div>

      <!-- Message area -->
      <div id="message" role="status" aria-live="polite" style="margin-bottom:12px; color:#b00020;"></div>

      <!-- Table container with subtle rounded border (inline styles only) -->
      <div id="tableArea" style="border:1px solid #ddd; border-radius:10px; padding:12px; background:#fff;"></div>

      <!-- Submit action -->
      <div style="margin-top:12px;">
        <button id="submitBtn" style="padding:10px 14px; border-radius:8px; border:1px solid #333; background:#fff; cursor:pointer;">Submit</button>
      </div>

    </div>

    <script>
      // Helper to create the table of inputs
      function createTable(rows, cols) {
        const area = document.getElementById('tableArea');
        area.innerHTML = ''; // clear

        // Create a simple table element
        const tbl = document.createElement('table');
        tbl.style.borderCollapse = 'separate';
        tbl.style.width = '100%';
        tbl.style.tableLayout = 'fixed';

        for (let r = 0; r < rows; r++) {
          const tr = document.createElement('tr');
          for (let c = 0; c < cols; c++) {
            const td = document.createElement('td');
            // remove the black rounded border around each cell
            td.style.border = 'none';
            td.style.padding = '6px';
            td.style.verticalAlign = 'top';
            td.style.borderRadius = '6px';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Enter text...';
            input.style.width = '100%';
            input.style.boxSizing = 'border-box';
            input.style.padding = '6px';
            input.style.border = '1px solid #ccc';
            input.style.borderRadius = '6px';

            // remove error styling when typing
            input.addEventListener('input', () => {
              input.style.borderColor = '#ccc';
              const msg = document.getElementById('message');
              msg.textContent = '';
            });

            td.appendChild(input);
            tr.appendChild(td);
          }
          tbl.appendChild(tr);
        }

        area.appendChild(tbl);
      }

      // Initial table on page load
      (function init() {
        const createBtn = document.getElementById('createBtn');
        const resetBtn = document.getElementById('resetBtn');
        const submitBtn = document.getElementById('submitBtn');

        createBtn.addEventListener('click', () => {
          const rows = Math.max(1, Math.min(50, parseInt(document.getElementById('rows').value || 1)));
          const cols = Math.max(1, Math.min(50, parseInt(document.getElementById('cols').value || 1)));
          createTable(rows, cols);
        });

        resetBtn.addEventListener('click', () => {
          document.getElementById('rows').value = 3;
          document.getElementById('cols').value = 4;
          createTable(3, 4);
          document.getElementById('message').textContent = '';
        });

        submitBtn.addEventListener('click', () => {
          const area = document.getElementById('tableArea');
          const table = area.querySelector('table');
          const rows = [];
          if (table) {
            for (const tr of table.rows) {
              const rowVals = [];
              for (const td of tr.cells) {
                // collect values as-is (empty allowed)
                const val = td.querySelector('input').value;
                rowVals.push(val);
              }
              rows.push(rowVals);
            }
          }

          const msg = document.getElementById('message');
          msg.style.color = '#0a7a07';
          msg.textContent = 'Submitted (empty cells allowed) — check console for values.';
          console.log('Submitted table data:', rows);
        });

        // create the default table
        createTable(3, 4);
      })();
    </script>

  </body>
</html>
